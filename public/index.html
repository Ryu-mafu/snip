<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snip — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0e10;
      --panel: #16181b;
      --line: #26292e;
      --txt: #ece7df;
      --dim: #8b8f96;
      --accent: #c6f24e;
      --accent-dim: #9bbf3a;
      --danger: #f2734e;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: "Hanken Grotesk", sans-serif;
      min-height: 100vh;
      padding: 48px 20px 80px;
      background-image:
        radial-gradient(circle at 15% 0%, rgba(198,242,78,0.06), transparent 40%),
        radial-gradient(circle at 90% 100%, rgba(242,115,78,0.05), transparent 40%);
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    header { margin-bottom: 40px; animation: rise .6s ease both; }
    .eyebrow {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px; letter-spacing: .22em; text-transform: uppercase;
      color: var(--accent-dim); margin-bottom: 14px;
    }
    h1 {
      font-family: "Fraunces", serif; font-weight: 600;
      font-size: clamp(40px, 9vw, 68px); line-height: .95; letter-spacing: -0.02em;
    }
    h1 em { font-style: italic; color: var(--accent); }
    .lead { color: var(--dim); margin-top: 16px; font-size: 16px; max-width: 46ch; }

    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 22px;
      animation: rise .6s ease both; animation-delay: .08s;
    }
    .field { display: flex; gap: 10px; }
    input[type="url"] {
      flex: 1; background: var(--bg); border: 1px solid var(--line);
      color: var(--txt); padding: 14px 16px; border-radius: 10px;
      font-family: "JetBrains Mono", monospace; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    input[type="url"]:focus { border-color: var(--accent-dim); }
    button.go {
      background: var(--accent); color: #11140a; border: none;
      padding: 0 22px; border-radius: 10px; cursor: pointer;
      font-family: "Hanken Grotesk"; font-weight: 600; font-size: 15px;
      transition: transform .12s, filter .2s; white-space: nowrap;
    }
    button.go:hover { filter: brightness(1.08); transform: translateY(-1px); }
    button.go:active { transform: translateY(0); }
    .msg { margin-top: 12px; font-size: 13px; min-height: 18px; font-family: "JetBrains Mono", monospace; }
    .msg.err { color: var(--danger); }
    .msg.ok { color: var(--accent); }

    .list-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin: 40px 0 14px; animation: rise .6s ease both; animation-delay: .16s;
    }
    .list-head h2 { font-family: "Fraunces", serif; font-weight: 500; font-size: 22px; }
    .count { font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--dim); }

    ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    li {
      background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: 16px 18px; display: flex; align-items: center; gap: 16px;
      animation: rise .45s ease both;
    }
    .short {
      font-family: "JetBrains Mono", monospace; color: var(--accent);
      font-size: 15px; text-decoration: none; white-space: nowrap;
    }
    .short:hover { text-decoration: underline; }
    .dest { color: var(--dim); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .clicks {
      font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--txt);
      background: var(--bg); border: 1px solid var(--line); border-radius: 999px;
      padding: 4px 12px; white-space: nowrap;
    }
    .icon-btn {
      background: transparent; border: 1px solid var(--line); color: var(--dim);
      border-radius: 8px; cursor: pointer; padding: 6px 10px; font-size: 12px;
      font-family: "JetBrains Mono", monospace; transition: all .15s;
    }
    .icon-btn:hover { color: var(--txt); border-color: var(--dim); }
    .icon-btn.del:hover { color: var(--danger); border-color: var(--danger); }
    .empty { color: var(--dim); font-style: italic; padding: 20px 4px; }

    footer { margin-top: 56px; text-align: center; color: var(--dim); font-size: 12px;
      font-family: "JetBrains Mono", monospace; }

    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @media (max-width: 560px) {
      .field { flex-direction: column; }
      button.go { padding: 12px; }
      li { flex-wrap: wrap; }
      .dest { flex-basis: 100%; order: 3; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Server-side · Node.js + Express</div>
      <h1>Snip<em>.</em></h1>
      <p class="lead">長いURLを短くして、クリック数をサーバー側で計測する小さなWebアプリケーション。</p>
    </header>

    <div class="card">
      <div class="field">
        <input type="url" id="url" placeholder="https://example.com/very/long/path?with=params" autocomplete="off" />
        <button class="go" id="go">短縮する</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>

    <div class="list-head">
      <h2>作成したリンク</h2>
      <span class="count" id="count"></span>
    </div>
    <ul id="list"></ul>

    <footer>Snip — a tiny server-side URL shortener</footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const origin = location.origin;

    async function load() {
      const res = await fetch("/api/links");
      const links = await res.json();
      render(links);
    }

    function render(links) {
      const list = $("list");
      $("count").textContent = links.length ? links.length + " 件" : "";
      if (!links.length) {
        list.innerHTML = '<div class="empty">まだリンクがありません。上で作成してみてください。</div>';
        return;
      }
      list.innerHTML = "";
      links.forEach((l, i) => {
        const li = document.createElement("li");
        li.style.animationDelay = (i * 0.04) + "s";
        const shortUrl = origin + "/" + l.code;
        li.innerHTML = `
          <a class="short" href="/${l.code}" target="_blank" rel="noopener">/${l.code}</a>
          <span class="dest" title="${escapeHtml(l.url)}">${escapeHtml(l.url)}</span>
          <span class="clicks">${l.clicks} クリック</span>
          <button class="icon-btn" data-copy="${shortUrl}">コピー</button>
          <button class="icon-btn del" data-del="${l.code}">削除</button>
        `;
        list.appendChild(li);
      });
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }

    async function shorten() {
      const input = $("url");
      const msg = $("msg");
      const url = input.value.trim();
      msg.className = "msg";
      msg.textContent = "";
      if (!url) { msg.className = "msg err"; msg.textContent = "URLを入力してください。"; return; }
      const res = await fetch("/api/shorten", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();
      if (!res.ok) { msg.className = "msg err"; msg.textContent = data.error || "エラーが発生しました。"; return; }
      msg.className = "msg ok";
      msg.textContent = "作成しました → " + origin + "/" + data.code;
      input.value = "";
      load();
    }

    document.addEventListener("click", async (e) => {
      if (e.target.dataset.copy) {
        await navigator.clipboard.writeText(e.target.dataset.copy);
        const t = e.target.textContent; e.target.textContent = "コピー済";
        setTimeout(() => (e.target.textContent = t), 1200);
      }
      if (e.target.dataset.del) {
        await fetch("/api/links/" + e.target.dataset.del, { method: "DELETE" });
        load();
      }
    });

    $("go").addEventListener("click", shorten);
    $("url").addEventListener("keydown", (e) => { if (e.key === "Enter") shorten(); });
    load();
  </script>
</body>
</html>
