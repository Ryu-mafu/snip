services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snip
      POSTGRES_PASSWORD: snip
      POSTGRES_DB: snip
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snip -d snip"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgres://snip:snip@db:5432/snip
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
